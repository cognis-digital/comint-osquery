<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <!-- Generated diagram (CC0 / public domain), no external assets. comint-osquery fleet pipeline. -->
  <rect width="760" height="360" fill="#0f1419"/>
  <text x="380" y="30" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">comint-osquery — fleet correlation &amp; POA&amp;M pipeline</text>

  <!-- host snapshots -->
  <g>
    <rect x="20" y="70" width="150" height="46" rx="6" fill="#1f6feb" opacity="0.85"/>
    <text x="95" y="92" fill="#fff" font-size="13" text-anchor="middle">host-web01.json</text>
    <text x="95" y="108" fill="#cdd9e5" font-size="10" text-anchor="middle">osquery snapshot</text>
    <rect x="20" y="126" width="150" height="46" rx="6" fill="#1f6feb" opacity="0.85"/>
    <text x="95" y="148" fill="#fff" font-size="13" text-anchor="middle">host-db02.json</text>
    <text x="95" y="164" fill="#cdd9e5" font-size="10" text-anchor="middle">osquery snapshot</text>
    <rect x="20" y="182" width="150" height="46" rx="6" fill="#1f6feb" opacity="0.85"/>
    <text x="95" y="204" fill="#fff" font-size="13" text-anchor="middle">host-app03.json</text>
    <text x="95" y="220" fill="#cdd9e5" font-size="10" text-anchor="middle">osquery snapshot</text>
  </g>

  <!-- scan_fleet -->
  <rect x="220" y="118" width="130" height="60" rx="6" fill="#238636"/>
  <text x="285" y="143" fill="#fff" font-size="13" text-anchor="middle" font-weight="600">scan_fleet()</text>
  <text x="285" y="160" fill="#d2f4d2" font-size="10" text-anchor="middle">per-host attribution</text>

  <!-- arrows hosts -> scan -->
  <g stroke="#8b949e" stroke-width="1.6" fill="none" marker-end="url(#a)">
    <path d="M170 93 C 195 110, 200 130, 219 138"/>
    <path d="M170 149 L 219 149"/>
    <path d="M170 205 C 195 188, 200 168, 219 160"/>
  </g>

  <!-- correlate -->
  <rect x="400" y="60" width="150" height="60" rx="6" fill="#9e6a03"/>
  <text x="475" y="85" fill="#fff" font-size="13" text-anchor="middle" font-weight="600">correlate()</text>
  <text x="475" y="102" fill="#f5e6c8" font-size="10" text-anchor="middle">systemic / isolated</text>

  <!-- baseline drift -->
  <rect x="400" y="135" width="150" height="46" rx="6" fill="#8957e5"/>
  <text x="475" y="157" fill="#fff" font-size="13" text-anchor="middle" font-weight="600">baseline_drift()</text>
  <text x="475" y="172" fill="#e7dcfb" font-size="10" text-anchor="middle">regress vs. improve</text>

  <!-- poam -->
  <rect x="400" y="196" width="150" height="46" rx="6" fill="#da3633"/>
  <text x="475" y="218" fill="#fff" font-size="13" text-anchor="middle" font-weight="600">poam_items()</text>
  <text x="475" y="233" fill="#fbd5d4" font-size="10" text-anchor="middle">CAT level + due date</text>

  <!-- arrows scan -> analyzers -->
  <g stroke="#8b949e" stroke-width="1.6" fill="none" marker-end="url(#a)">
    <path d="M350 138 C 375 120, 380 100, 399 92"/>
    <path d="M350 150 C 375 152, 380 156, 399 158"/>
    <path d="M350 162 C 375 185, 380 205, 399 215"/>
  </g>

  <!-- outputs -->
  <g>
    <rect x="600" y="60" width="140" height="40" rx="6" fill="#30363d"/>
    <text x="670" y="85" fill="#e6edf3" font-size="12" text-anchor="middle">fleet report</text>
    <rect x="600" y="135" width="140" height="40" rx="6" fill="#30363d"/>
    <text x="670" y="160" fill="#e6edf3" font-size="12" text-anchor="middle">drift JSON</text>
    <rect x="600" y="196" width="140" height="40" rx="6" fill="#30363d"/>
    <text x="670" y="221" fill="#e6edf3" font-size="12" text-anchor="middle">eMASS POA&amp;M CSV</text>
  </g>
  <g stroke="#8b949e" stroke-width="1.6" fill="none" marker-end="url(#a)">
    <path d="M550 88 L 599 82"/>
    <path d="M550 158 L 599 155"/>
    <path d="M550 219 L 599 216"/>
  </g>

  <text x="380" y="300" fill="#8b949e" font-size="11" text-anchor="middle">All stages are pure-stdlib, deterministic, and fully offline. No fabricated identifiers — control / STIG / CCI / ATT&amp;CK come from the shipped STIG pack.</text>
  <text x="380" y="322" fill="#56606b" font-size="10" text-anchor="middle">Diagram: Cognis Digital, released CC0 / public domain.</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8b949e"/>
    </marker>
  </defs>
</svg>
